<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Cockpit</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --panel2: #1c2230; --border: #2a3038;
        --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --ok: #3fb950;
        --warn: #d29922; --flash: #f85149; --idle: #6e7681;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      header {
        display: flex; align-items: center; gap: 12px; padding: 12px 18px;
        border-bottom: 1px solid var(--border); background: var(--panel);
        position: sticky; top: 0; z-index: 10;
      }
      header h1 { font-size: 16px; margin: 0; letter-spacing: 0.5px; }
      header .count { color: var(--dim); }
      main { padding: 18px; }
      form.new {
        display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; padding: 12px; margin-bottom: 18px;
      }
      form.new .goal { grid-column: 1 / -1; }
      input, button, textarea {
        font: inherit; color: var(--text); background: var(--panel2);
        border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
      }
      input::placeholder { color: var(--idle); }
      button { cursor: pointer; background: #21324a; border-color: #2f4a6b; }
      button:hover { filter: brightness(1.2); }
      button.primary { background: var(--accent); color: #04101f; border: none; font-weight: 600; }
      button.ok { background: var(--ok); color: #04140a; border: none; }
      button.deny { background: var(--flash); color: #1a0505; border: none; }
      button.ghost { background: transparent; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
      .card {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
      }
      .card.flash { border-color: var(--flash); animation: flash 1s ease-in-out infinite; }
      @keyframes flash {
        0%, 100% { box-shadow: 0 0 0 0 rgba(248,81,73,0.0); }
        50% { box-shadow: 0 0 0 4px rgba(248,81,73,0.45); }
      }
      .card h2 { font-size: 14px; margin: 0; font-weight: 600; }
      .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .row.between { justify-content: space-between; }
      .badge {
        font-size: 11px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
        letter-spacing: 0.5px; font-weight: 700;
      }
      .badge.running { background: #10351f; color: var(--ok); }
      .badge.awaiting-input { background: #3a0f0d; color: var(--flash); }
      .badge.idle, .badge.done { background: #22262d; color: var(--idle); }
      .badge.starting { background: #2a2410; color: var(--warn); }
      .badge.error, .badge.interrupted { background: #3a0f0d; color: var(--flash); }
      .meta { color: var(--dim); font-size: 12px; }
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .stat { background: var(--panel2); border-radius: 6px; padding: 6px 8px; }
      .stat .k { color: var(--dim); font-size: 10px; text-transform: uppercase; }
      .stat .v { font-size: 14px; font-weight: 600; }
      .ctx { height: 7px; background: var(--panel2); border-radius: 4px; overflow: hidden; }
      .ctx > i { display: block; height: 100%; background: var(--accent); transition: width 0.4s ease; }
      .ctx > i.low { background: var(--ok); }
      .ctx > i.mid { background: var(--warn); }
      .ctx > i.high { background: var(--flash); }
      .preview {
        background: var(--panel2); border-radius: 6px; padding: 8px 10px;
        color: var(--dim); font-size: 12px; max-height: 78px; overflow: auto; white-space: pre-wrap;
      }
      .perm {
        background: #1e0f10; border: 1px solid var(--flash); border-radius: 8px; padding: 10px;
        display: flex; flex-direction: column; gap: 8px;
      }
      .perm .tool { color: var(--flash); font-weight: 700; }
      .perm pre { margin: 0; font-size: 11px; color: var(--text); white-space: pre-wrap; max-height: 120px; overflow: auto; }
      .actions { display: flex; gap: 6px; flex-wrap: wrap; }
      .empty { color: var(--dim); text-align: center; padding: 40px; }
      details summary { cursor: pointer; color: var(--dim); font-size: 12px; }
      .merge {
        background: var(--panel2); border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px;
      }
      .merge.conflict { border-color: var(--warn); }
      .mbadge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; text-transform: uppercase; }
      .mbadge.clean { background: #10351f; color: var(--ok); }
      .mbadge.conflict { background: #3a2410; color: var(--warn); }
      .mbadge.up-to-date { background: #22262d; color: var(--idle); }
      .mbadge.unknown { background: #22262d; color: var(--idle); }
      .merge .files { font-size: 11px; color: var(--warn); white-space: pre-wrap; }
      .merge button { padding: 4px 8px; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>⌁ AGENT COCKPIT</h1>
      <span class="count" id="count">0 sessions</span>
      <button class="ghost" id="refreshMerge" style="margin-left:auto">↻ Check all merges</button>
      <button class="ghost" id="shutdown" title="Tear down all cockpit worktrees (branches kept) and stop the server">⏻ Shutdown</button>
    </header>
    <main>
      <form class="new" id="newForm">
        <input class="goal" name="goal" placeholder="Goal for this session (title of the window)…" required />
        <input name="repo" placeholder="Repo path (e.g. c:\\github\\ioSender)" required />
        <input name="model" placeholder="model (optional, e.g. claude-opus-4-8)" />
        <input name="baseURL" placeholder="baseURL (optional — Tier-1 provider swap, e.g. http://localhost:4000)" />
        <button class="primary" type="submit">Spawn session ▸</button>
      </form>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty">No sessions yet. Spawn one above — it gets its own git worktree.</div>
    </main>

    <script>
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      function esc(s) { return String(s ?? '').replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
      function post(path, body) {
        return fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
      }

      function render(sessions) {
        count.textContent = sessions.length + ' session' + (sessions.length === 1 ? '' : 's');
        empty.style.display = sessions.length ? 'none' : 'block';
        grid.innerHTML = sessions.map(cardHtml).join('');
        // wire buttons
        for (const s of sessions) {
          const el = document.getElementById('card-' + s.id);
          if (!el) continue;
          el.querySelector('[data-allow]')?.addEventListener('click', () =>
            post(`/api/sessions/${s.id}/permission`, { permissionId: s.pending.id, allow: true }));
          el.querySelector('[data-deny]')?.addEventListener('click', () =>
            post(`/api/sessions/${s.id}/permission`, { permissionId: s.pending.id, allow: false, message: 'Denied by operator.' }));
          el.querySelector('[data-interrupt]')?.addEventListener('click', () =>
            post(`/api/sessions/${s.id}/interrupt`, {}));
          el.querySelector('[data-vscode]')?.addEventListener('click', () =>
            post(`/api/sessions/${s.id}/open-vscode`, {}));
          el.querySelector('[data-remove]')?.addEventListener('click', () =>
            fetch(`/api/sessions/${s.id}`, { method: 'DELETE' }));
          el.querySelector('[data-send]')?.addEventListener('click', () => {
            const inp = el.querySelector('[data-msg]');
            if (inp && inp.value.trim()) { post(`/api/sessions/${s.id}/message`, { text: inp.value }); inp.value = ''; }
          });
          el.querySelector('[data-refresh-merge]')?.addEventListener('click', () =>
            post(`/api/sessions/${s.id}/refresh-merge`, {}));
          el.querySelector('[data-merge]')?.addEventListener('click', async (e) => {
            const btn = e.target; btn.disabled = true; btn.textContent = 'merging…';
            const r = await post(`/api/sessions/${s.id}/merge`, {}).then((x) => x.json()).catch(() => null);
            if (r && r.result && r.result.status === 'refused') alert('Merge refused: ' + r.result.reason);
            else if (r && r.result && r.result.status === 'error') alert('Merge error: ' + r.result.reason);
          });
          el.querySelector('[data-abort-merge]')?.addEventListener('click', () =>
            post(`/api/sessions/${s.id}/abort-merge`, {}));
          el.querySelector('[data-open-integration]')?.addEventListener('click', () =>
            post(`/api/sessions/${s.id}/open-integration`, {}));
          el.querySelector('[data-promote]')?.addEventListener('click', async (e) => {
            const btn = e.target; btn.disabled = true; btn.textContent = 'promoting…';
            const r = await post(`/api/sessions/${s.id}/promote`, {}).then((x) => x.json()).catch(() => null);
            if (r && r.result && r.result.status !== 'merged') alert('Promote failed: ' + (r.result.reason || r.result.status));
          });
        }
      }

      function cardHtml(s) {
        const flash = s.status === 'awaiting-input' ? ' flash' : '';
        const ctxPct = s.contextWindow && s.contextUsed ? Math.min(100, Math.round((s.contextUsed / s.contextWindow) * 100)) : 0;
        const ctxCls = ctxPct >= 90 ? 'high' : ctxPct >= 70 ? 'mid' : 'low';
        const ctxLabel = s.contextWindow
          ? `context ${fmt(s.contextUsed || 0)} / ${fmt(s.contextWindow)} (${ctxPct}%)`
          : `context ${fmt(s.contextUsed)} tokens`;
        const perm = s.pending
          ? `<div class="perm">
               <div class="row between"><span class="tool">⚑ NEEDS YOU — ${esc(s.pending.toolName)}</span></div>
               <pre>${esc(JSON.stringify(s.pending.input, null, 2))}</pre>
               <div class="actions">
                 <button class="ok" data-allow>Allow ✓</button>
                 <button class="deny" data-deny>Deny ✗</button>
               </div>
             </div>` : '';
        return `<div class="card${flash}" id="card-${s.id}">
          <div class="row between">
            <h2>${esc(s.goal)}</h2>
            <span class="badge ${s.status}">${s.status}</span>
          </div>
          <div class="meta">${esc(s.provider)}${s.model ? ' · ' + esc(s.model) : ''}${s.baseURL ? ' · ⇄ ' + esc(s.baseURL) : ''} · ${esc(s.branch)}</div>
          <div class="stats">
            <div class="stat"><div class="k">turns</div><div class="v">${s.turns}</div></div>
            <div class="stat"><div class="k">tokens in/out</div><div class="v">${fmt(s.inputTokens)}/${fmt(s.outputTokens)}</div></div>
            <div class="stat"><div class="k">cost</div><div class="v">$${(s.costUsd || 0).toFixed(4)}</div></div>
          </div>
          <div>
            <div class="meta">${ctxLabel}</div>
            <div class="ctx"><i class="${ctxCls}" style="width:${ctxPct}%"></i></div>
          </div>
          ${perm}
          ${mergeHtml(s)}
          ${s.lastText ? `<div class="preview">${esc(s.lastText)}</div>` : ''}
          <div class="actions">
            <input data-msg placeholder="send a follow-up message…" style="flex:1" />
            <button data-send>Send</button>
            <button class="ghost" data-vscode title="Open this worktree in a new VS Code window">⧉ VS Code</button>
            <button class="ghost" data-interrupt>Interrupt</button>
            <button class="ghost" data-remove>✕ Remove</button>
          </div>
        </div>`;
      }

      function mergeHtml(s) {
        const m = s.merge;
        const cls = m && m.preview === 'conflict' ? ' conflict' : '';
        if (!m) {
          return `<div class="merge"><div class="row between">
            <span class="meta">merge → ${esc(s.baseBranch)} · not checked</span>
            <button data-refresh-merge>↻ check</button></div></div>`;
        }
        const canMerge = m.ahead > 0 && m.preview !== 'up-to-date' && m.preview !== 'conflict';
        const files = m.conflictFiles.length
          ? `<div class="files">conflicts: ${m.conflictFiles.map(esc).join(', ')}</div>` : '';
        const conflictActions = (m.preview === 'conflict' || m.merging)
          ? `<button data-open-integration title="Open the integration worktree to resolve">⧉ Open integration</button>
             ${m.merging ? '<button class="deny" data-abort-merge>Abort merge</button>' : ''}` : '';
        const integrationLive = m.targetBranch !== m.baseBranch;
        const promote = integrationLive && !m.merging
          ? `<button data-promote title="Fast-forward ${esc(m.baseBranch)} up to the integration branch">Promote → ${esc(m.baseBranch)}</button>` : '';
        return `<div class="merge${cls}">
          <div class="row between">
            <span class="meta">merge → <b>${esc(m.targetBranch)}</b> · ↑${m.ahead} ↓${m.behind}${m.dirty ? ' · ⚠ dirty' : ''}</span>
            <span class="mbadge ${m.preview}">${m.preview}</span>
          </div>
          ${files}
          <div class="row">
            <button data-refresh-merge>↻</button>
            ${canMerge ? `<button class="ok" data-merge>Merge → ${esc(m.targetBranch)}</button>` : ''}
            ${conflictActions}
            ${promote}
          </div>
        </div>`;
      }

      function fmt(n) {
        if (n == null) return '—';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
        return String(n);
      }

      document.getElementById('newForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const f = e.target;
        const body = {
          goal: f.goal.value.trim(),
          repo: f.repo.value.trim(),
          model: f.model.value.trim() || undefined,
          baseURL: f.baseURL.value.trim() || undefined,
        };
        const r = await post('/api/sessions', body);
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Failed: ' + (err.error || r.status)); return; }
        f.goal.value = '';
      });

      document.getElementById('refreshMerge').addEventListener('click', () =>
        post('/api/refresh-merge', {}));

      document.getElementById('shutdown').addEventListener('click', async () => {
        if (!confirm('Tear down all cockpit worktrees (branches are kept) and stop the server?')) return;
        await post('/api/shutdown', {}).catch(() => {});
        document.body.innerHTML = '<p style="padding:40px;color:#8b949e">Cockpit shut down. Worktrees removed; branches kept.</p>';
      });

      // Live updates via SSE.
      const ev = new EventSource('/api/events');
      ev.onmessage = (m) => render(JSON.parse(m.data));
      ev.onerror = () => { /* browser auto-reconnects */ };
    </script>
  </body>
</html>
